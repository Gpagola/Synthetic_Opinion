name: Deploy to sb0

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-sb0
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend (base /personae/)
        working-directory: frontend
        run: |
          npm ci
          VITE_API_BASE=/personae/api npx vite build --base=/personae/

      - name: Install ssh tools
        run: sudo apt-get update && sudo apt-get install -y sshpass rsync

      - name: Rsync project to server
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e rsync -az --delete \
            --exclude '.git' --exclude '.github' --exclude 'node_modules' \
            --exclude '.venv' --exclude 'venv' --exclude '__pycache__' \
            --exclude '*.pyc' --exclude '.env' \
            -e "ssh -o StrictHostKeyChecking=no" \
            ./ "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/home/debian/Personae/"

      - name: Ensure ANTHROPIC_API_KEY in server .env
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        # El .env vive en el servidor (el rsync lo excluye). Reescribimos la línea
        # de la key desde el secret de GitHub para que los Focus Groups (Claude)
        # tengan credenciales. Idempotente.
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "ENV=/home/debian/Personae/backend/.env; touch \$ENV; grep -v '^ANTHROPIC_API_KEY=' \$ENV > \$ENV.tmp 2>/dev/null || true; echo 'ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}' >> \$ENV.tmp; mv \$ENV.tmp \$ENV; echo 'ANTHROPIC_API_KEY set in server .env'"

      - name: Rebuild & restart backend
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" 'bash -s' <<'REMOTE'
          set -e
          cd /home/debian/Personae/backend
          docker build -t personae-backend .
          docker rm -f personae-backend 2>/dev/null || true
          docker run -d --name personae-backend --restart unless-stopped \
            --env-file /home/debian/Personae/backend/.env \
            -p 127.0.0.1:8010:8000 personae-backend
          sleep 6
          curl -sf http://127.0.0.1:8010/health && echo " [backend OK]"
          REMOTE

      - name: Smoke test público
        run: |
          # -k: el runner puede no tener la cadena del cert; validamos código y salud
          code=$(curl -sk -o /dev/null -w "%{http_code}" https://sb0.braintrust-cs.com/personae/)
          echo "frontend /personae/ -> HTTP $code"
          test "$code" = "200"
          health=$(curl -sk https://sb0.braintrust-cs.com/personae/api/health)
          echo "api health -> $health"
          echo "$health" | grep -q '"status":"ok"'
