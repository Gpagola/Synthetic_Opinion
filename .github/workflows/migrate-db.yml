name: Migrate DB

on:
  workflow_dispatch:
    inputs:
      script:
        description: "Script Python a ejecutar dentro del contenedor (ruta relativa a /app)"
        required: true
        default: "add_condiciones_column.py"

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Install ssh tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Run migration script (synchronous)
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "docker exec personae-backend python ${{ github.event.inputs.script }}"
          echo "Script ${{ github.event.inputs.script }} ejecutado."
