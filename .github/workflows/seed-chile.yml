name: Seed Chile population

# Ejecución manual (workflow_dispatch). Reutiliza los mismos secrets que el
# deploy (SERVER_USER / SERVER_HOST / SERVER_PASSWORD) para conectarse por SSH a
# sb0 y lanzar el seed DENTRO del contenedor del backend, que ya tiene el .env
# (DATABASE_URL al MySQL de producción y la API key de OpenAI).

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Número de personas chilenas a generar"
        required: true
        default: "600"

concurrency:
  group: seed-chile
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Install ssh tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Launch Chile seed (detached) inside backend container
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        # Lanzamos el seed DETACHED (docker exec -d) y con salida sin búfer
        # (python -u) volcada a un log dentro del contenedor. Así el proceso
        # sobrevive aunque la sesión SSH se corte por inactividad (lo que tumbó
        # el intento anterior). El progreso se monitoriza luego por la API.
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "docker exec -d personae-backend sh -c 'python -u seed_chile_pyramid.py ${{ github.event.inputs.count }} > /tmp/seed_cl.log 2>&1'"
          echo "Seed lanzado en segundo plano en el servidor (count=${{ github.event.inputs.count }})."
