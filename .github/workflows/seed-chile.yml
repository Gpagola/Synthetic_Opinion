name: Seed Chile population

# Ejecución manual (workflow_dispatch). Reutiliza los mismos secrets que el
# deploy (SERVER_USER / SERVER_HOST / SERVER_PASSWORD) para conectarse por SSH a
# sb0 y lanzar el seed DENTRO del contenedor del backend, que ya tiene el .env
# (DATABASE_URL al MySQL de producción y la API key de OpenAI).

on:
  workflow_dispatch:
    inputs:
      count:
        description: "Número de personas chilenas a generar"
        required: true
        default: "600"

concurrency:
  group: seed-chile
  cancel-in-progress: false

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - name: Install ssh tools
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Run Chile seed inside backend container
        env:
          SSHPASS: ${{ secrets.SERVER_PASSWORD }}
        run: |
          sshpass -e ssh -o StrictHostKeyChecking=no \
            "${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}" \
            "docker exec personae-backend python seed_chile_pyramid.py ${{ github.event.inputs.count }}"
